<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <center>
        <h2>Registration Form</h2>
        <form action="./login.html"> 
            <p>
            <input 
                 type="text"
                 placeholder="Enter your name"
                 name="name" required/>
            </p>
            <p>
             <input 
             type="Email" 
             placeholder="Email"
             name="mail" required/>
            </p>
            <p>
                <input 
                type="password"
                placeholder="Enter password"
                name="pass" required/>
            </p>           
            <p>
                <input
                type="number"
                placeholder="Enter number" required/>
            </p>
            <p>
                <input 
                   type="radio"
                   name="gender"
                   id="gmale"
                   value="male" required/>
                   <label for="gmale">male</label>
            
                   <input type="radio" 
                   name="gender"
                   id="gfemale"
                   value="female" required/>
                   <label for="gfemale">Female</label>
            </p>  

            <p>      
                <input type="checkbox" id="gdiploma" value="10th" required/> 
                <label for="gdiploma">10th</label>
                <input type="checkbox" id="gdegree" value="diploma" required/> 
                <label for="gdegree">diploma</label>
                <input type="checkbox" id="giti" value="ITI" required/> 
                <label for="giti">ITI</label>
                <input type="checkbox" id="gdegree" value="degree" required/> 
                <label for="gdegree">degree</label>
            </p>
            <p>
                <textarea placeholder="Enter your addres" name="" id="" required ></textarea>

            </p>
            <p>
                <select required> 
                <option value="">select your city</option>
                <option value="hyderabad">hyderabad</option>
                <option value="vizag">vizag</option>
                <option value="mumbai">mumbai</option>
                </select>
        </p>
        <p>
            <label for="">Date of birth</label>
            <input type="date" required />

        </p>



        <button>submit</button>
        </form>
        </center>
</body>
</html>
