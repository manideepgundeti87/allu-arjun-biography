<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!--<link rel="stylesheet" href="external.css">-->
    <style>
        body {
            background: #FDFC47;
            /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #24FE41, #FDFC47);
            /* Chrome 10-25, Safari 5.1-6 */
            background: linear-gradient(to right, #24FE41, #FDFC47);
            /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
        }
        .parent{
            background-color: aqua;
            width: 400px;
            height: 500px;
            margin: 200px 600px;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0px 3px 30px rgba(0,0,0,0.6);
        }
        h1{
            text-align: center;
        }
        .form-field input{
            margin: 10px;
            width: 90%;
            padding:10px;
            border-radius: 10px;
            display: flex;
        }
        .form-checkbox{
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px;
            padding:10px;
        }
        button{
            margin: 6px;
            align-content: center;
            padding: 10px;
            width:95%;
            border-radius: 10px;
            border: none;
            background-color: #24FE41;
        }
        a{
            text-decoration: none;
            color: red;
        }
        .form-field{
            text-align:center;
        }
    </style>
</head>
<body>
        <form action="./biography.html" class="parent">
        <h1>Login</h1>
        <div class="form-field">
            <label for="email"><b>Email:</b></label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-field">
            <label for="password"><b>Password:</b></label>
            <input type="password" name="pasword" id="password"  placeholder="Enter your password" required>
        </div>
        <div class="form-checkbox">
        <div>
            <input type="checkbox" id="remember">
            <label for="remember">Remember Me</label>
        </div>
            <a href="#">Forgot Password?</a>
        </div>
        <div>
            <button><b>Login</b></button>
        </div>
        <div class="form-field">
            <p>Don't have an account?<a href="">Sign Up</a></p>
        </div>
        </form> 
</body>
</html>
